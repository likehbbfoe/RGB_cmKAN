experiment: samsung2iphone_unsupervised
save_dir: experiments
resume: True
accelerator: 'gpu'

model:
  type: cycle_cm_kan
  params:
    in_dims:
      - 3
    out_dims:
      - 3
    grid_size: 5
    spline_order: 3
    residual_std: 0.1
    grid_range:
      - 0.0
      - 1.0

data:
  type: samsung2iphone_unpaired
  train:
    source: 'data/samsung2iphone/train/samsung'
    target: 'data/samsung2iphone/train/iphone'
  val:
    source: 'data/samsung2iphone/val/samsung'
    target: 'data/samsung2iphone/val/iphone'
  test:
    source: 'data/samsung2iphone/test/samsung'
    target: 'data/samsung2iphone/test/iphone'

pipeline:
  type: unsupervised
  params:
    lr: 1e-3
    batch_size: 6
    val_batch_size: 6
    test_batch_size: 2
    epochs: 500
    save_freq: 10
    visualize_freq: 10
    pretrained: True
    pretrained_model: 'experiments/samsung2iphone_unsupervised_pretrain/logs/checkpoints/last.ckpt'
