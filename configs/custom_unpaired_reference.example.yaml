experiment: custom_unpaired_reference_v6
save_dir: experiments
resume: false
accelerator: auto

model:
  type: reference_cycle_cm_kan
  params:
    in_dims:
      - 3
    out_dims:
      - 3
    grid_size: 5
    spline_order: 3
    residual_std: 0.1
    grid_range:
      - 0.0
      - 1.0

data:
  type: custom_unpaired
  train:
    source: data/custom_unpaired/train/source
    target: data/custom_unpaired/train/target
  val:
    source: data/custom_unpaired/val/source
    target: data/custom_unpaired/val/target
  params:
    crop_size: 256
    resize_size: 286
    horizontal_flip_probability: 0.5
    vertical_flip_probability: 0.0
    num_workers: 4
    recursive: true
    pair_by_subdirectory: true
    seed: 42

pipeline:
  type: unsupervised
  params:
    optimizer: adam
    lr: 0.0002
    weight_decay: 0.0
    batch_size: 2
    val_batch_size: 1
    test_batch_size: 1
    epochs: 200
    save_freq: 10
    visualize_freq: 1
    training_mode: adversarial
    pretrained: false
    pretrained_model: null
    adversarial_weight: 2.0
    cycle_weight: 5.0
    identity_weight: 1.0
    domain_statistics_weight: 0.0
    exposure_weight: 0.0
    chroma_weight: 0.0
    reflectance_weight: 0.5
    patch_nce_weight: 0.25
    patch_nce_num_patches: 256
    patch_nce_temperature: 0.07
    reference_style_weight: 10.0
    range_weight: 1.0
    warmup_epochs: 0
    gradient_clip_val: 1.0
    discriminator_lr_scale: 1.0
